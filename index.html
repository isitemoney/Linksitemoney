<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoter Dashboard Pro | النسخة النهائية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap'); 
        body { font-family: 'Tajawal', sans-serif; } 
        .hidden { display: none !important; } 
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-10">

    <!-- شاشة الزوار -->
    <div id="redirect-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-6">
        <div class="loader ease-linear rounded-full border-4 border-slate-800 h-16 w-16 mb-6"></div>
        <h2 class="text-2xl font-bold text-blue-400">جاري فحص الأمان...</h2>
    </div>

    <!-- نافبار -->
    <nav id="nav" class="hidden bg-slate-900 p-4 border-b border-slate-800 flex justify-between items-center px-6 sticky top-0 z-50">
        <div class="flex flex-col">
            <span id="nav-title" class="text-xl font-bold text-blue-400">لوحة المروج</span>
            <span id="user-welcome" class="text-[10px] text-slate-400 font-medium italic">جاري التحميل...</span>
        </div>
        <button onclick="logout()" class="bg-red-500/20 text-red-500 px-4 py-1 rounded-lg border border-red-500/50 text-sm">خروج</button>
    </nav>

    <!-- تسجيل الدخول -->
    <div id="auth-section" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-800">
            <h2 id="auth-title" class="text-2xl font-bold text-center mb-6 text-blue-400 font-bold">تسجيل الدخول</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="اسمك الكامل" class="hidden w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-blue-500">
                <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-blue-500">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-blue-500">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition">دخول</button>
                <button onclick="toggleAuthMode()" id="auth-switch" class="w-full text-slate-400 text-sm">ليس لديك حساب؟ سجل الآن</button>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard-section" class="hidden p-4 max-w-6xl mx-auto space-y-6 mt-6">
        <!-- الإحصائيات -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                <p class="text-slate-400 text-xs">إجمالي الأرباح</p>
                <h3 id="stat-total" class="text-2xl font-bold text-emerald-400 font-mono">$0.00</h3>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                <p class="text-slate-400 text-xs">أرباح اليوم</p>
                <h3 id="stat-today" class="text-2xl font-bold text-blue-400 font-mono">$0.00</h3>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                <p class="text-slate-400 text-xs">النقرات الصحيحة</p>
                <h3 id="stat-clicks" class="text-2xl font-bold text-purple-400 font-mono">0</h3>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 text-center">
                <p class="text-slate-400 text-xs">الستريك</p>
                <h3 id="stat-streak" class="text-2xl font-bold text-orange-400 font-mono">🔥 1</h3>
            </div>
        </div>

        <!-- رابط التسويق -->
        <div id="ref-box" class="bg-blue-600/10 border border-blue-600/30 p-6 rounded-2xl">
            <h4 class="font-bold mb-3 flex items-center gap-2 text-blue-400 font-bold">🔗 رابط التسويق الخاص بك</h4>
            <div class="flex bg-slate-950 rounded-xl overflow-hidden border border-slate-700 p-1">
                <input type="text" id="ref-link" readonly class="bg-transparent p-3 flex-1 text-sm outline-none text-blue-300 font-mono">
                <button onclick="copyRef()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg text-sm font-bold transition">نسخ</button>
            </div>
            <p class="text-[11px] text-blue-400/80 mt-3 font-medium italic">* الربح يُحتسب مرة واحدة لكل زائر يومياً (Anti-Cheat Active).</p>
        </div>

        <!-- أزرار العمليات للمروج -->
        <div id="user-actions" class="grid grid-cols-2 gap-4">
            <button onclick="openWithdraw()" class="bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold transition shadow-lg flex items-center justify-center">💰 طلب سحب</button>
            <a href="https://t.me/eruuiyl" target="_blank" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-xl font-bold border border-slate-700 flex items-center justify-center">💬 الدعم</a>
        </div>

        <!-- مودال السحب -->
        <div id="withdraw-modal" class="hidden bg-slate-900 p-6 rounded-2xl border-2 border-emerald-500/30 space-y-4">
            <h3 class="text-xl font-bold text-emerald-400 text-center font-bold">طلب سحب جديد</h3>
            <div class="space-y-3">
                <select id="w-method" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none">
                    <option value="ZainCash">Zain Cash - زين كاش</option>
                    <option value="USDT">USDT (TRC20)</option>
                    <option value="PayPal">PayPal</option>
                    <option value="AsiaCell">Asiacell - رصيد آسيا</option>
                </select>
                <input type="text" id="w-account" placeholder="رقم المحفظة أو الحساب" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none">
                <input type="number" id="w-amount" placeholder="المبلغ (الحد الأدنى $20)" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none">
                <button onclick="confirmWithdraw()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold hover:bg-emerald-700 transition">إرسال الطلب</button>
                <button onclick="openWithdraw()" class="w-full text-slate-500 text-sm">إلغاء</button>
            </div>
        </div>

        <!-- لوحة الإدارة (تظهر للأدمن فقط) -->
        <div id="admin-area" class="hidden space-y-8 mt-10 border-t border-slate-800 pt-10">
            <div class="bg-red-900/10 border border-red-500/30 p-6 rounded-2xl shadow-xl">
                <h2 class="text-red-400 font-bold mb-4 flex items-center gap-2">⚠️ طلبات السحب الواردة</h2>
                <div id="withdraw-list" class="space-y-4 text-sm"></div>
            </div>

            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <h2 class="text-blue-400 font-bold mb-4 flex items-center gap-2">👥 إدارة المروجين</h2>
                <div id="admin-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnkJf-6sAeRJpm34yXLmklLwSxM-GJvUc",
            authDomain: "my-dash-c78e3.firebaseapp.com",
            databaseURL: "https://my-dash-c78e3-default-rtdb.firebaseio.com",
            projectId: "my-dash-c78e3",
            storageBucket: "my-dash-c78e3.firebasestorage.app",
            messagingSenderId: "137154835768",
            appId: "1:137154835768:web:7f396782de1300f9bdfdcd"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        const ADMIN_EMAILS = ["xxetali46@gmail.com", "xxetali47@gmail.com"]; 
        const DEFAULT_MARKETING_LINK = "https://hp.funroom.store/a/8nw6emt2";

        // --- نظام التوجيه وكشف الغش ---
        async function checkRoute() {
            const params = new URLSearchParams(window.location.search);
            const promoterId = params.get('id');
            if (promoterId) {
                document.getElementById('redirect-screen').classList.remove('hidden');
                handleVisitorAntiCheat(promoterId);
            } else {
                initDashboard();
            }
        }

        async function handleVisitorAntiCheat(id) {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const vIp = ipData.ip.replace(/\./g, '_'); 
                const ipRef = db.ref('ip_logs/' + id + '/' + vIp);
                const userRef = db.ref('users/' + id);

                const ipSnap = await ipRef.get();
                const now = Date.now();
                if (ipSnap.val() && (now - ipSnap.val() < 86400000)) {
                    finalizeRedirect(userRef);
                } else {
                    await ipRef.set(now);
                    await userRef.transaction(d => {
                        if (d) {
                            d.clicks = (d.clicks || 0) + 1;
                            d.balance = Number(((d.balance || 0) + 0.02).toFixed(2));
                            d.todayBalance = Number(((d.todayBalance || 0) + 0.02).toFixed(2));
                        }
                        return d;
                    });
                    finalizeRedirect(userRef);
                }
            } catch (e) { window.location.href = DEFAULT_MARKETING_LINK; }
        }

        async function finalizeRedirect(ref) {
            const snap = await ref.get();
            const link = (snap.val() && snap.val().marketingLink) ? snap.val().marketingLink : DEFAULT_MARKETING_LINK;
            setTimeout(() => { window.location.href = link; }, 1000);
        }

        // --- إدارة الدخول واللوحة ---
        function initDashboard() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    showUI('dashboard-section');
                    loadUserData(user);
                    if (ADMIN_EMAILS.includes(user.email)) {
                        document.getElementById('admin-area').classList.remove('hidden');
                        document.getElementById('nav-title').innerText = "لوحة المدير";
                        loadAdminData();
                    }
                } else {
                    showUI('auth-section');
                }
            });
        }

        function loadUserData(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val();
                if(!d) return;
                document.getElementById('stat-total').innerText = `$${(d.balance || 0).toFixed(2)}`;
                document.getElementById('stat-today').innerText = `$${(d.todayBalance || 0).toFixed(2)}`;
                document.getElementById('stat-clicks').innerText = d.clicks || 0;
                document.getElementById('stat-streak').innerText = `🔥 ${d.streak || 1}`;
                document.getElementById('user-welcome').innerText = `أهلاً بك، ${d.username}`;
                const path = window.location.protocol + "//" + window.location.host + window.location.pathname;
                document.getElementById('ref-link').value = path + "?id=" + user.uid;
                currentBalance = d.balance || 0;
            });
        }

        // --- وظائف الأدمن (الإدارة + السحب) ---
        function loadAdminData() {
            // 1. تحميل المروجين
            db.ref('users').on('value', snap => {
                const users = snap.val();
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                for (let id in users) {
                    if (ADMIN_EMAILS.includes(users[id].email)) continue;
                    list.innerHTML += `
                        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div class="text-right">
                                <p class="text-blue-400 font-bold">${users[id].username} <span class="text-[10px] text-slate-500 italic">(${id})</span></p>
                                <p class="text-xs text-slate-400">الرصيد الحالي: <span class="text-emerald-500">$${users[id].balance}</span></p>
                            </div>
                            <div class="flex gap-2 w-full md:w-auto">
                                <input id="link-${id}" type="text" placeholder="رابط مخصص" class="flex-1 bg-slate-800 p-2 rounded text-xs border border-slate-700 outline-none focus:border-purple-500">
                                <button onclick="updateLink('${id}')" class="bg-purple-600 px-4 py-2 rounded text-xs font-bold transition hover:bg-purple-500">تحديث</button>
                            </div>
                        </div>`;
                }
            });

            // 2. تحميل طلبات السحب مع طرق الدفع
            db.ref('withdrawals').on('value', snap => {
                const wData = snap.val();
                const list = document.getElementById('withdraw-list');
                list.innerHTML = "";
                if(!wData) { list.innerHTML = "<p class='text-slate-500 italic'>لا توجد طلبات سحب معلقة حالياً.</p>"; return; }
                
                for (let wid in wData) {
                    const req = wData[wid];
                    db.ref('users/' + req.uid).once('value', uSnap => {
                        const u = uSnap.val();
                        list.innerHTML += `
                            <div class="bg-slate-950 p-4 rounded-xl border-r-4 border-emerald-500 flex flex-col md:flex-row justify-between items-center gap-4 animate-pulse-once">
                                <div class="text-right space-y-1">
                                    <p class="font-bold text-emerald-400 underline">طلب سحب: $${req.amount}</p>
                                    <p class="text-xs">المروج: ${u ? u.username : 'مجهول'}</p>
                                    <p class="text-xs text-yellow-500">طريقة الدفع: ${req.method}</p>
                                    <p class="text-[11px] bg-slate-800 p-1 rounded font-mono text-slate-300">الحساب: ${req.account}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="markAsPaid('${wid}')" class="bg-emerald-600 px-4 py-2 rounded text-xs font-bold transition hover:bg-emerald-500">تم الدفع ✅</button>
                                    <button onclick="db.ref('withdrawals/${wid}').remove()" class="bg-red-900/30 text-red-500 px-4 py-2 rounded text-xs border border-red-500/50">رفض ❌</button>
                                </div>
                            </div>`;
                    });
                }
            });
        }

        function markAsPaid(wid) {
            if(confirm("هل أنت متأكد من إتمام الدفع؟ سيتم حذف الطلب من القائمة.")) {
                db.ref('withdrawals/' + wid).remove().then(() => alert("تم تحديث الطلب بنجاح."));
            }
        }

        function updateLink(id) {
            const link = document.getElementById('link-' + id).value;
            if(link) db.ref('users/' + id).update({ marketingLink: link }).then(() => alert("تم تحديث الرابط بنجاح."));
        }

        // --- باقي الوظائف المساعدة ---
        function showUI(id) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('nav').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if (id === 'dashboard-section') document.getElementById('nav').classList.remove('hidden');
        }

        let isLoginMode = true;
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('username').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-title').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب مروج";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (isLoginMode) { await auth.signInWithEmailAndPassword(email, pass); } 
                else {
                    const name = document.getElementById('username').value;
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.ref('users/' + res.user.uid).set({
                        username: name, email, balance: 0, todayBalance: 0, clicks: 0, streak: 1, marketingLink: DEFAULT_MARKETING_LINK
                    });
                }
            } catch (e) { alert(e.message); }
        }

        function openWithdraw() { document.getElementById('withdraw-modal').classList.toggle('hidden'); }

        function confirmWithdraw() {
            const amount = parseFloat(document.getElementById('w-amount').value);
            const method = document.getElementById('w-method').value;
            const account = document.getElementById('w-account').value;
            if (amount < 20 || amount > currentBalance) return alert("المبلغ غير مسموح به.");
            if (!account) return alert("يرجى إدخال حساب الدفع.");
            
            db.ref('withdrawals').push({ uid: auth.currentUser.uid, amount, method, account, timestamp: Date.now() })
            .then(() => { alert("✅ تم إرسال طلب السحب بنجاح."); openWithdraw(); });
        }

        function copyRef() {
            const el = document.getElementById('ref-link');
            el.select(); document.execCommand('copy');
            alert("✅ تم النسخ!");
        }

        function logout() { auth.signOut(); }

        checkRoute();
    </script>
</body>
</html>
